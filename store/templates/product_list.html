<h1>Products</h1>
<a href="{% url 'product_create' %}">Create Product</a>
<ul>
  {% for product in products %}
    <li>
      {{ product.name }} -
      <a href="{% url 'product_update' product.pk %}">Edit</a> |
      <a href="{% url 'product_delete' product.pk %}">Delete</a>
    </li>
  {% empty %}
    <li>No products available.</li>
  {% endfor %}
</ul>
